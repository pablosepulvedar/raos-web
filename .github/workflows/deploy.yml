name: Deploy Production

on:
  push:
    branches: [master]

jobs:
  migrate:
    name: Aplicar migraciones Supabase
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al proyecto remoto
        run: supabase link --project-ref naxdteshucafrelbuupc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Aplicar migraciones pendientes
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    name: Disparar deploy en Vercel
    needs: migrate
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Llamar Deploy Hook de Vercel
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
